<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrderLoop  | Procurement Management</title>
    <meta
      name="description"
      content="OrderLoop — an internal order-approval tool that carries one order from draft to close."
    />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OrderLoop — Mini Order Loop" />
    <meta
      property="og:description"
      content="One order, start to close. An internal order-approval tool."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OrderLoop — Mini Order Loop" />
    <meta
      name="twitter:description"
      content="One order, start to close. An internal order-approval tool."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <script>
      // Apply theme before first paint to avoid a light/dark flash.
      const stored = localStorage.getItem('theme')
      if (
        stored === 'dark' ||
        (stored === null && window.matchMedia('(prefers-color-scheme: dark)').matches)
      ) {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
